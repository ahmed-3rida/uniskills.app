<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>جاري إعادة التوجيه... | UniSkills</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/uniskills-logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=4.3.0">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .redirect-box {
            max-width: 520px;
            width: 100%;
            background: rgba(15, 20, 50, 0.8);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 217, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .redirect-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: progress-bar 10s linear forwards;
            transform-origin: left;
        }

        @keyframes progress-bar {
            from {
                transform: scaleX(0);
            }

            to {
                transform: scaleX(1);
            }
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-area img {
            width: 36px;
            height: 36px;
        }

        .logo-area span {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
        }

        .shield-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(187, 134, 252, 0.1));
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.3);
            }

            50% {
                box-shadow: 0 0 0 12px rgba(0, 217, 255, 0);
            }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .dest-url {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.35);
            word-break: break-all;
            margin-bottom: 32px;
            direction: ltr;
            text-align: left;
        }

        /* Countdown ring */
        .countdown-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 28px;
        }

        .countdown-svg {
            transform: rotate(-90deg);
            width: 90px;
            height: 90px;
        }

        .countdown-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 6;
        }

        .countdown-ring {
            fill: none;
            stroke: url(#cGrad);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 245;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* Buttons */
        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary), #00a8cc);
            color: #0A0E27;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.35);
            width: 100%;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }

        .btn-open.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 217, 255, 0.5);
        }

        .skip-link {
            display: block;
            margin-top: 14px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .skip-link:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .warning-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>

<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="redirect-box">
        <div class="logo-area">
            <img src="/uniskills.png" alt="UniSkills">
            <span>UniSkills</span>
        </div>

        <div class="shield-icon">🔗</div>

        <h1>إعادة توجيه آمنة</h1>
        <p class="subtitle">استمر بعد التحقق من الرابط. نحمي مجتمعنا من الروابط الضارة.</p>

        <div class="dest-url" id="dest-url-display">جارٍ التحميل...</div>

        <!-- Countdown SVG Ring -->
        <div class="countdown-wrapper">
            <svg class="countdown-svg" viewBox="0 0 90 90">
                <defs>
                    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00D9FF" />
                        <stop offset="100%" style="stop-color:#BB86FC" />
                    </linearGradient>
                </defs>
                <circle class="countdown-track" cx="45" cy="45" r="39" />
                <circle class="countdown-ring" id="countdown-ring" cx="45" cy="45" r="39" />
            </svg>
            <span class="countdown-num" id="countdown-num">10</span>
        </div>

        <a id="btn-open" class="btn-open" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M14 3h7v7l-2.7-2.7-8.6 8.6-1.4-1.4 8.6-8.6L14 3zM5 5h6l-2 2H5v12h12v-4l2-2v6H3V5h2z" />
            </svg>
            افتح الرابط الآن
        </a>

        <span class="skip-link" id="skip-link" style="display:none;" onclick="openNow()">تخطي الانتظار →</span>

        <p class="warning-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
            </svg>
            UniSkills ليست مسؤولة عن محتوى الروابط الخارجية
        </p>
    </div>

    <script>
        const COUNTDOWN = 10;
        const circumference = 2 * Math.PI * 39; // 245.04

        const params = new URLSearchParams(window.location.search);
        let destUrl = '';
        try {
            destUrl = atob(params.get('url') || '');
        } catch (e) {
            destUrl = params.get('url') || '/';
        }

        // Validate it's a real URL
        let safeUrl = '/';
        try {
            const parsed = new URL(destUrl);
            if (['http:', 'https:'].includes(parsed.protocol)) {
                safeUrl = destUrl;
            }
        } catch (e) { }

        // Show truncated URL
        const displayEl = document.getElementById('dest-url-display');
        displayEl.textContent = safeUrl.length > 60 ? safeUrl.substring(0, 60) + '...' : safeUrl;

        const ring = document.getElementById('countdown-ring');
        const numEl = document.getElementById('countdown-num');
        const btnOpen = document.getElementById('btn-open');
        const skipLink = document.getElementById('skip-link');

        ring.style.strokeDashoffset = 0;

        let remaining = COUNTDOWN;

        function tick() {
            remaining--;
            numEl.textContent = remaining;

            const progress = (COUNTDOWN - remaining) / COUNTDOWN;
            ring.style.strokeDashoffset = circumference * progress;

            if (remaining <= 0) {
                clearInterval(timer);
                showButton();
            }
        }

        function showButton() {
            numEl.textContent = '✓';
            numEl.style.fontSize = '1.4rem';
            btnOpen.href = safeUrl;
            btnOpen.classList.add('visible');
            skipLink.style.display = 'none';
        }

        function openNow() {
            clearInterval(timer);
            showButton();
            window.open(safeUrl, '_blank', 'noopener,noreferrer');
        }

        // Show skip after 3s
        setTimeout(() => {
            if (remaining > 0) skipLink.style.display = 'block';
        }, 3000);

        const timer = setInterval(tick, 1000);
    </script>
</body>

</html>
