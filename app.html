    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 25px;
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin-bottom: 30px;
            width: 100%;
            max-width: 350px;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .download-btn:active {
            transform: translateY(-1px);
        }

        .download-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .platform-info {
            display: none;
            color: #4a5568;
            font-size: 14px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }

        .platform-info.show {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .alternative-links {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(102, 126, 234, 0.2);
        }

        .alternative-links h3 {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .store-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .store-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            text-decoration: none;
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .store-link:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
        }

        .store-link svg {
            width: 24px;
            height: 24px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .features {
            margin-top: 30px;
            text-align: right;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            color: #4a5568;
            font-size: 15px;
        }

        .feature svg {
            width: 20px;
            height: 20px;
            fill: #667eea;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 26px;
            }

            .subtitle {
                font-size: 16px;
            }

            .download-btn {
                font-size: 18px;
                padding: 16px 30px;
            }

            .store-links {
                flex-direction: column;
            }

            .store-link {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="uniskills-logo.png" alt="UniSkills Logo">
        </div>

        <h1>حمّل تطبيق UniSkills</h1>
        <p class="subtitle">منصة التعلم الذكي بالذكاء الاصطناعي<br>متاح الآن على جميع الأجهزة</p>

        <a href="#" id="smartDownloadBtn" class="download-btn">
            <span class="loading"></span>
            <span id="btnText">جاري التحميل...</span>
        </a>

        <div id="platformInfo" class="platform-info"></div>

        <div class="features">
            <div class="feature">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>كورسات تعليمية متنوعة</span>
            </div>
            <div class="feature">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>مساعد ذكي بالذكاء الاصطناعي</span>
            </div>
            <div class="feature">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>شهادات معتمدة</span>
            </div>
            <div class="feature">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span>امتحانات تفاعلية</span>
            </div>
        </div>

        <div class="alternative-links">
            <h3>أو اختر المتجر مباشرة:</h3>
            <div class="store-links">
                <a href="https://play.google.com/store/apps/details?id=com.uniskills.app" class="store-link" target="_blank" rel="noopener">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="#34A853" d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5Z"/><path fill="#4285F4" d="M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81Z"/><path fill="#FBBC04" d="M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/></svg>
                    <span>Google Play</span>
                </a>
                <a href="https://apps.apple.com/app/uniskills/id123456789" class="store-link" target="_blank" rel="noopener">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    <span>App Store</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Store URLs - استبدل هذه الروابط بروابطك الفعلية
        const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.uniskills.app';
        const APP_STORE_URL = 'https://www.uniskills.pro';
        const WEB_APP_URL = 'https://www.uniskills.pro';

        // Detect platform
        function detectPlatform() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // iOS detection
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return 'ios';
            }
            
            // Android detection
            if (/android/i.test(userAgent)) {
                return 'android';
            }
            
            // Desktop or other
            return 'other';
        }

        // Get appropriate download URL
        function getDownloadURL(platform) {
            switch(platform) {
                case 'android':
                    return PLAY_STORE_URL;
                case 'ios':
                    return APP_STORE_URL;
                default:
                    return PLAY_STORE_URL; // Default to Play Store
            }
        }

        // Get platform name in Arabic
        function getPlatformName(platform) {
            switch(platform) {
                case 'android':
                    return 'Android';
                case 'ios':
                    return 'iOS';
                default:
                    return 'متصفح الويب';
            }
        }

        // Initialize smart download
        function initSmartDownload() {
            const platform = detectPlatform();
            const downloadURL = getDownloadURL(platform);
            const platformName = getPlatformName(platform);
            
            const btn = document.getElementById('smartDownloadBtn');
            const btnText = document.getElementById('btnText');
            const platformInfo = document.getElementById('platformInfo');
            
            // Update button
            btn.href = downloadURL;
            
            if (platform === 'android') {
                btnText.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5Z"/></svg>
                    تحميل من Google Play
                `;
            } else if (platform === 'ios') {
                btnText.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    تحميل من App Store
                `;
            } else {
                btnText.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="currentColor" d="M19,20H5V4H7V7H17V4H19M12,2A1,1 0 0,1 13,3A1,1 0 0,1 12,4A1,1 0 0,1 11,3A1,1 0 0,1 12,2M19,2H14.82C14.4,0.84 13.3,0 12,0C10.7,0 9.6,0.84 9.18,2H5A2,2 0 0,0 3,4V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V4A2,2 0 0,0 19,2Z"/></svg>
                    تحميل التطبيق
                `;
            }
            
            // Show platform info
            platformInfo.textContent = `تم اكتشاف جهازك: ${platformName}`;
            platformInfo.classList.add('show');
            
            // Auto redirect after 2 seconds
            setTimeout(() => {
                window.location.href = downloadURL;
            }, 2000);
        }

        // Track download click
        function trackDownload(platform) {
            // Add your analytics tracking here
            if (typeof gtag !== 'undefined') {
                gtag('event', 'download_click', {
                    'event_category': 'app_download',
                    'event_label': platform,
                    'value': 1
                });
            }
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initSmartDownload);

        // Track button click
        document.getElementById('smartDownloadBtn').addEventListener('click', function() {
            const platform = detectPlatform();
            trackDownload(platform);
        });
    </script>
</body>

</html>
